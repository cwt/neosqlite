[tool.poetry]
name = "nx-27017"
version = "0.6.0"
description = "NeoSQLite Experimental Project 27017 - MongoDB Wire Protocol Server"
authors = ["NeoSQLite Team"]
license = "MIT"
readme = "README.md"
packages = [
    { include = "nx_27017", from = "src" }
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Topic :: Database",
]

[tool.poetry.dependencies]
python = "^3.10, <3.15"
neosqlite = "^1.13.0"
pymongo = "^4.16.0"

[tool.poetry.extras]
speed = ["uvloop"]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0"
pytest-asyncio = "^1.0.0"
pytest-cov = "^7.1"
mypy = "^1.17"

[tool.poetry.scripts]
nx-27017 = "nx_27017.nx_27017:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true
